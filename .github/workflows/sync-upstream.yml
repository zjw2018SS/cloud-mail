name: Sync upstream
on:
  schedule: [{cron: "37 4 * * *"}]
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync from maillab/cloud-mail
        run: |
          git remote add upstream https://github.com/maillab/cloud-mail.git
          git fetch upstream main
          git merge upstream/main --no-edit --allow-unrelated-histories || { echo "NO_UPSTREAM_CHANGES"; exit 0; }
          git push origin main